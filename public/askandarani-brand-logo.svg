<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Champagne Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="30%" stop-color="#F5D78E"/>
      <stop offset="60%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B7B2E"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#9B7B2E"/>
    </linearGradient>

    <!-- Royal Blue Gradient -->
    <linearGradient id="royalBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#050B1E"/>
    </radialGradient>

    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: Deep Royal Blue Circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGlow)"/>

  <!-- Outer Gold Ring -->
  <circle cx="256" cy="256" r="250" fill="none" stroke="url(#goldGrad)" stroke-width="5"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#goldShine)" stroke-width="1" opacity="0.5"/>
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.3" stroke-dasharray="2 4"/>

  <!-- Premium Phone Icon (centered, gold) -->
  <g filter="url(#goldGlow)">
    <rect x="188" y="118" width="136" height="266" rx="22" ry="22"
          fill="#050B1E"
          stroke="url(#goldGrad)"
          stroke-width="3.5"/>
    <rect x="198" y="138" width="116" height="226" rx="12" ry="12"
          fill="#0A0A0A"/>
    <circle cx="256" cy="148" r="3.5" fill="url(#goldShine)"/>
    <rect x="240" y="370" width="32" height="3" rx="1.5" fill="url(#goldGrad)"/>

    <!-- Check mark on phone screen (blue, like original image) -->
    <g transform="translate(256, 230)">
      <circle cx="0" cy="0" r="32" fill="url(#royalBlue)" opacity="0.9"/>
      <path d="M -12,0 L -4,10 L 14,-10"
            stroke="#FFF8DC"
            stroke-width="4"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"/>
    </g>

    <!-- WiFi waves (gold, like original) -->
    <g opacity="0.85">
      <path d="M 290 140 Q 305 140 305 125" stroke="url(#goldGrad)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M 296 138 Q 316 138 316 118" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
      <path d="M 302 136 Q 326 136 326 110" stroke="url(#goldGrad)" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    </g>
  </g>

  <!-- Bank Card / Wallet (overlapping phone bottom-right, blue + gold) -->
  <g filter="url(#goldGlow)" transform="translate(280, 250)">
    <rect x="0" y="0" width="100" height="68" rx="10" ry="10"
          fill="url(#royalBlue)"
          stroke="url(#goldGrad)"
          stroke-width="2.5"/>
    <!-- Gold magnetic stripe -->
    <rect x="0" y="10" width="100" height="12" fill="url(#goldShine)"/>
    <!-- Card chip -->
    <rect x="12" y="32" width="14" height="10" rx="2" ry="2" fill="url(#goldShine)"/>
    <!-- Card lines -->
    <line x1="32" y1="36" x2="80" y2="36" stroke="url(#goldShine)" stroke-width="0.8" opacity="0.6"/>
    <line x1="32" y1="44" x2="70" y2="44" stroke="url(#goldShine)" stroke-width="0.6" opacity="0.4"/>
    <line x1="12" y1="52" x2="60" y2="52" stroke="url(#goldShine)" stroke-width="0.5" opacity="0.3"/>
    <!-- Card clasp -->
    <circle cx="88" cy="34" r="3" fill="url(#goldShine)"/>
  </g>

  <!-- Curved text paths -->
  <defs>
    <path id="topArc" d="M 90 256 A 166 166 0 0 1 422 256" fill="none"/>
    <path id="bottomArc" d="M 110 256 A 146 146 0 0 0 402 256" fill="none"/>
  </defs>

  <!-- Top text: "إسكندراني فون" (Arabic, gold) -->
  <text font-family="Cairo, Tajawal, Arial, sans-serif"
        font-size="28"
        font-weight="800"
        fill="url(#goldShine)"
        letter-spacing="1">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">إسكندراني فون</textPath>
  </text>

  <!-- Bottom text: PREMIUM · EGYPT -->
  <text font-family="Cairo, Tajawal, Arial, sans-serif"
        font-size="16"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="6">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">★ PREMIUM · EGYPT ★</textPath>
  </text>

  <!-- Gold laurel branches (sides) -->
  <g opacity="0.9">
    <path d="M 405 256 Q 405 220 392 195" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 405 256 Q 405 292 392 317" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="398" cy="220" rx="3.5" ry="7" transform="rotate(-30 398 220)" fill="url(#goldGrad)"/>
    <ellipse cx="398" cy="292" rx="3.5" ry="7" transform="rotate(30 398 292)" fill="url(#goldGrad)"/>

    <path d="M 107 256 Q 107 220 120 195" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 107 256 Q 107 292 120 317" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>
    <ellipse cx="114" cy="220" rx="3.5" ry="7" transform="rotate(30 114 220)" fill="url(#goldGrad)"/>
    <ellipse cx="114" cy="292" rx="3.5" ry="7" transform="rotate(-30 114 292)" fill="url(#goldGrad)"/>
  </g>

  <!-- Crown at top -->
  <g transform="translate(256, 78)" opacity="0.95">
    <path d="M -22,0 L -16,-12 L -8,-4 L 0,-16 L 8,-4 L 16,-12 L 22,0 Z"
          fill="url(#goldShine)"
          stroke="url(#goldGrad)"
          stroke-width="1"/>
    <circle cx="-16" cy="-12" r="2" fill="#FFFFFF"/>
    <circle cx="0" cy="-16" r="2.5" fill="#FFFFFF"/>
    <circle cx="16" cy="-12" r="2" fill="#FFFFFF"/>
    <rect x="-24" y="0" width="48" height="4" rx="1" fill="url(#goldGrad)"/>
  </g>

  <!-- Sparkle stars -->
  <g fill="url(#goldShine)">
    <path d="M 100 110 L 102 114 L 106 116 L 102 118 L 100 122 L 98 118 L 94 116 L 98 114 Z" opacity="0.9"/>
    <path d="M 412 110 L 414 114 L 418 116 L 414 118 L 412 122 L 410 118 L 406 116 L 410 114 Z" opacity="0.9"/>
  </g>
</svg>
